<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes de Errores - Mi Aula de Enfermería</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/reports.css">
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon">
</head>
<body>
    <div class="container reports-container">
        <header class="reports-header">
            <h1>📋 Reportes de Errores</h1>
            <p>Gestión de reportes enviados por los usuarios</p>
            <button id="btnVolver" class="btn-volver" onclick="window.location.href='/index.html'">
                <span class="btn-icon">←</span> Volver al Menú Principal
            </button>
        </header>

        <!-- Estadísticas -->
        <div class="stats-reports-grid" id="statsReportsGrid">
            <div class="stat-card">
                <div class="stat-label">Total Reportes</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-card pendiente">
                <div class="stat-label">Pendientes</div>
                <div class="stat-value" id="statPendientes">0</div>
            </div>
            <div class="stat-card en_revision">
                <div class="stat-label">En Revisión</div>
                <div class="stat-value" id="statEnRevision">0</div>
            </div>
            <div class="stat-card resuelto">
                <div class="stat-label">Resueltos</div>
                <div class="stat-value" id="statResueltos">0</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtros-reports">
            <div class="filtro-group">
                <label>📊 Estado:</label>
                <select id="filtroEstado" class="filtro-select">
                    <option value="todos">Todos</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="en_revision">En Revisión</option>
                    <option value="resuelto">Resueltos</option>
                    <option value="cerrado">Cerrados</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>👤 Usuario:</label>
                <input type="text" id="filtroUsuario" placeholder="Nombre o legajo..." class="filtro-input">
            </div>
            <div class="filtro-group">
                <label>📅 Desde:</label>
                <input type="date" id="filtroDesde" class="filtro-input">
            </div>
            <div class="filtro-group">
                <label>📅 Hasta:</label>
                <input type="date" id="filtroHasta" class="filtro-input">
            </div>
            <button id="btnRefrescar" class="btn-refrescar">🔄 Refrescar</button>
        </div>

        <!-- Lista de reportes -->
        <div id="reportsList" class="reports-list">
            <div class="loading-message">Cargando reportes...</div>
        </div>
    </div>

    <!-- Modal para ver detalle del reporte -->
    <div id="reporteModal" class="modal-overlay" style="display: none;">
        <div class="modal-container modal-large">
            <div class="modal-header">
                <h2 id="modalTitle">Detalle del Reporte</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-content" id="reporteModalContent">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <script src="/js/area.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/reports.js"></script>
    <script src="/logs/browser-logger.js"></script>
</body>
</html>
